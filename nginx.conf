# For more information on configuration, see:
#   * Official English Documentation: http://nginx.org/en/docs/


#user root;
worker_processes auto;
error_log /var/log/nginx/error.log;
pid /run/nginx.pid;

include /usr/share/nginx/modules/*.conf;

events {
    worker_connections 1024;
}

http {
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;
    types_hash_max_size 4096;

    include             /etc/nginx/mime.types;
    default_type        application/octet-stream;

    # ---------------------------------------------------------------
    # Gzip compression — reduces transfer size by 70%
    # Applied globally to all server blocks
    # ---------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 1000;
    gzip_types
        application/json
        application/javascript
        application/xml
        text/css
        text/plain
        text/html
        image/svg+xml
        font/woff2;

    include /etc/nginx/conf.d/*.conf;

    # ---------------------------------------------------------------
    # Upstream blocks — keepalive reuses connections to backends
    # Avoids TCP handshake on every request (saves 10-30ms each)
    # ---------------------------------------------------------------
    upstream msq_kol_backend {
        server 127.0.0.1:5000;
        keepalive 32;
    }

    upstream msq_ath_backend {
        server 127.0.0.1:5050;
        keepalive 16;
    }

