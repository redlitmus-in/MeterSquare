    # ---------------------------------------------------------------
    # msq.kol.tel — OPTIMIZED
    # Changes: upstream keepalive, gzip, static frontend, buffer tuning
    # ---------------------------------------------------------------
    server {
        server_name msq.kol.tel;

        root /var/www/msq/;
        index index.html index.htm;

        # Socket.IO WebSocket — must be before /api/
        location /socket.io/ {
            proxy_pass         http://msq_kol_backend/socket.io/;
            proxy_http_version 1.1;
            proxy_redirect     off;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_connect_timeout  7d;
            proxy_send_timeout     7d;
            proxy_read_timeout     7d;
            proxy_buffering off;
        }

        # API — proxy to Gunicorn (port 5000)
        location /api/ {
            proxy_pass         http://msq_kol_backend/api/;
            proxy_http_version 1.1;
            proxy_redirect     off;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
            client_max_body_size       20m;
            client_body_buffer_size    128k;
            proxy_connect_timeout      30s;
            proxy_send_timeout         120s;
            proxy_read_timeout         120s;
            proxy_buffer_size          16k;
            proxy_buffers              8 16k;
            proxy_busy_buffers_size    32k;
        }

        # Frontend — static files served by Nginx (was: Vite dev server port 3003)
        location / {
            try_files $uri $uri/ /index.html;

            location = /index.html {
                add_header Cache-Control "no-store, no-cache, must-revalidate";
            }
        }

        # Static assets — cache 1 year (Vite content-hashed filenames)
        location /assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        error_page 404 /index.html;
        error_page 500 502 503 504 /50x.html;
        location = /50x.html { }

        listen 443 ssl;
        ssl_certificate /etc/letsencrypt/live/msq.kol.tel/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/msq.kol.tel/privkey.pem;
        include /etc/letsencrypt/options-ssl-nginx.conf;
    }

    # ---------------------------------------------------------------
    # msq.ath.cx — OPTIMIZED
    # Changes: upstream keepalive, gzip, static frontend, SPA routing fix,
    #          separate web root /var/www/msq-ath (was sharing /var/www/msq)
    # ---------------------------------------------------------------
    server {
        server_name msq.ath.cx;

        root /var/www/msq-ath/;
        index index.html index.htm;

        # Socket.IO WebSocket
        location /socket.io/ {
            proxy_pass         http://msq_ath_backend/socket.io/;
