        }

        error_page 404 /index.html;
        error_page 500 502 503 504 /50x.html;
        location = /50x.html { }

        listen 443 ssl;
        ssl_certificate /etc/letsencrypt/live/msq.ath.cx/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/msq.ath.cx/privkey.pem;
        include /etc/letsencrypt/options-ssl-nginx.conf;
    }

