# ================================================================
# msq.ath.cx — Drop this file into /etc/nginx/conf.d/msq-ath.conf
# This ONLY affects msq.ath.cx — no other apps touched
# ================================================================

upstream msq_ath_backend {
    server 127.0.0.1:5050;
    keepalive 16;
}

server {
    server_name msq.ath.cx;

    root /var/www/msq-ath/;
    index index.html index.htm;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 1000;
    gzip_types application/json application/javascript text/css text/plain text/html image/svg+xml font/woff2;

    # Socket.IO WebSocket
    location /socket.io/ {
        proxy_pass         http://msq_ath_backend/socket.io/;
        proxy_http_version 1.1;
        proxy_redirect     off;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_connect_timeout  7d;
        proxy_send_timeout     7d;
        proxy_read_timeout     7d;
        proxy_buffering off;
    }

    # API — port 5050 (Gunicorn)
    location /api/ {
        proxy_pass         http://msq_ath_backend/api/;
        proxy_http_version 1.1;
        proxy_redirect     off;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        client_max_body_size       20m;
        client_body_buffer_size    128k;
        proxy_connect_timeout      30s;
        proxy_send_timeout         120s;
        proxy_read_timeout         120s;
        proxy_buffer_size          16k;
        proxy_buffers              8 16k;
        proxy_busy_buffers_size    32k;
    }

    # Frontend static files + SPA routing fix
    location / {
        try_files $uri $uri/ /index.html;
        location = /index.html {
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html { }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/msq.ath.cx/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/msq.ath.cx/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
}

server {
    listen 80;
    server_name msq.ath.cx;
    return 301 https://$host$request_uri;
}
