# ================================================================
# MeterSquare Nginx Server Block — msq.kol.tel
# Replace the existing msq.kol.tel server block in nginx.conf with this
# ================================================================

# Upstream block — allows keepalive connection reuse to Gunicorn
# (reduces TCP handshake overhead per request)
upstream msq_backend {
    server 127.0.0.1:5000;
    keepalive 32;   # reuse 32 persistent connections to Gunicorn
}

server {
    server_name msq.kol.tel;

    root /var/www/msq;
    index index.html;

    # ---------------------------------------------------------------
    # Gzip compression — reduces API + static file transfer by ~70%
    # ---------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 1000;
    gzip_types
        application/json
        application/javascript
        application/xml
        text/css
        text/plain
        text/html
        image/svg+xml
        font/woff2;

    # ---------------------------------------------------------------
    # Socket.IO WebSocket — must come BEFORE /api/ block
    # ---------------------------------------------------------------
    location /socket.io/ {
        proxy_pass http://msq_backend/socket.io/;
        proxy_http_version 1.1;
        proxy_redirect off;

        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;

        # WebSocket upgrade headers
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Long timeouts for persistent WebSocket connections
        proxy_connect_timeout   7d;
        proxy_send_timeout      7d;
        proxy_read_timeout      7d;

        # Disable buffering for real-time streaming
        proxy_buffering off;
    }

    # ---------------------------------------------------------------
    # API — proxy to Gunicorn backend
    # ---------------------------------------------------------------
    location /api/ {
        proxy_pass http://msq_backend/api/;
        proxy_http_version 1.1;
        proxy_redirect off;

        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;
        proxy_set_header Connection         "";   # clear for keepalive

        # File upload support
        client_max_body_size        20m;
        client_body_buffer_size     128k;

        # API timeouts
        proxy_connect_timeout       30s;
        proxy_send_timeout          120s;
        proxy_read_timeout          120s;

        # Response buffering (improves throughput for large responses)
        proxy_buffer_size           16k;
        proxy_buffers               8 16k;
        proxy_busy_buffers_size     32k;
    }

    # ---------------------------------------------------------------
    # Frontend — serve static build files directly from Nginx
    # (was: proxy_pass to Vite dev server on port 3003 — REMOVED)
    # ---------------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;   # React SPA routing fallback

        # Cache HTML: no-cache (always check for updates)
        location = /index.html {
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }
    }

    # Static assets: JS, CSS, images — cache for 1 year
    # (Vite adds content hashes to filenames, so this is safe)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;  # Don't log static asset hits
    }

    # ---------------------------------------------------------------
    # Error pages
    # ---------------------------------------------------------------
    error_page 404 /index.html;   # Let React Router handle 404s

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }

    # ---------------------------------------------------------------
    # SSL — managed by Certbot (do not remove)
    # ---------------------------------------------------------------
    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/msq.kol.tel/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/msq.kol.tel/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name msq.kol.tel;
    return 301 https://$host$request_uri;
}
